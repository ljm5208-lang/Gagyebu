<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>가계부</title>
<style>
/* ── VARIABLES ── */
:root {
  --bg:         #F7F5F2;
  --bg2:        #EEEAE4;
  --surface:    #FFFFFF;
  --border:     #E2DDD6;
  --border2:    #CCC8C0;
  --text:       #1C1A17;
  --text-dim:   #6B6560;
  --text-muted: #A8A29A;
  --income:     #2D7D46;
  --income-bg:  #EBF5EF;
  --expense:    #C0392B;
  --expense-bg: #FDECEA;
  --accent:     #E8760A;
  --accent-bg:  #FEF3E8;
  --accent-dk:  #B85D06;
  --blue:       #2563EB;
  --blue-bg:    #EFF4FF;
  --purple:     #7C3AED;
  --purple-bg:  #F5F0FF;
  --radius:     16px;
  --shadow:     0 2px 12px rgba(0,0,0,0.07);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── RESET ── */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', '맑은 고딕', sans-serif;
  max-width: 430px;
  margin: 0 auto;
}

/* ── LAYOUT ── */
.shell { display: flex; flex-direction: column; height: 100dvh; height: 100vh; overflow: hidden; }

.body-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(72px + var(--safe-bottom));
  background: var(--bg);
}

.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── HEADER ── */
.header {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
  box-shadow: var(--shadow);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.app-title { font-size: 20px; font-weight: 700; color: var(--accent); }
.add-fab {
  width: 38px; height: 38px;
  background: var(--accent); border: none; border-radius: 12px;
  color: #fff; font-size: 26px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(232,118,10,0.35);
  transition: transform 0.15s;
}
.add-fab:active { transform: scale(0.92); }

.month-row { display: flex; align-items: center; justify-content: space-between; }
.month-nav { display: flex; align-items: center; gap: 4px; }
.month-arrow {
  width: 32px; height: 32px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-dim); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s;
}
.month-arrow:active { background: var(--border); }
.month-label { font-size: 15px; font-weight: 600; min-width: 88px; text-align: center; }

.month-summary { display: flex; gap: 14px; }
.ms-item { text-align: right; }
.ms-label { font-size: 10px; color: var(--text-muted); }
.ms-value { font-size: 13px; font-weight: 600; }
.ms-value.income { color: var(--income); }
.ms-value.expense { color: var(--expense); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + var(--safe-bottom));
  display: flex; z-index: 30;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 0; background: transparent; border: none;
  cursor: pointer; transition: transform 0.15s;
}
.nav-item:active { transform: scale(0.9); }
.nav-item-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
.nav-item-label { font-size: 10px; color: var(--text-muted); font-weight: 500; transition: color 0.2s; }
.nav-item.active .nav-item-icon { transform: scale(1.15); }
.nav-item.active .nav-item-label { color: var(--accent); font-weight: 700; }

/* ── CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 14px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.badge {
  font-size: 11px; font-weight: 600; padding: 3px 8px;
  border-radius: 20px; background: var(--bg2); color: var(--text-dim);
}

/* ── HERO ── */
.balance-hero {
  background: linear-gradient(135deg, var(--accent), #F59020);
  border-radius: var(--radius); padding: 22px 20px; margin-bottom: 14px;
  position: relative; overflow: hidden;
  box-shadow: 0 6px 24px rgba(232,118,10,0.28);
}
.balance-hero::before {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 130px; height: 130px; background: rgba(255,255,255,0.12);
  border-radius: 50%; pointer-events: none;
}
.bh-label { font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 4px; }
.bh-amount { font-size: 36px; font-weight: 700; color: #fff; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
.bh-amount.negative { color: #FFD0CC; }
.bh-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bh-item { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 10px 12px; }
.bh-item-label { font-size: 10px; color: rgba(255,255,255,0.8); margin-bottom: 3px; }
.bh-item-value { font-size: 17px; font-weight: 700; color: #fff; }

/* ── ACCOUNT CARDS ── */
.accounts-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px;
  scrollbar-width: none;
}
.accounts-scroll::-webkit-scrollbar { display: none; }

.account-card {
  flex-shrink: 0; width: 160px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.account-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 14px 14px;
}
.account-card.type-checking::after  { background: var(--blue); }
.account-card.type-savings::after   { background: var(--income); }
.account-card.type-card::after      { background: var(--expense); }
.account-card.type-investment::after{ background: var(--purple); }
.account-card.type-cash::after      { background: var(--accent); }
.acc-icon  { font-size: 20px; margin-bottom: 8px; }
.acc-name  { font-size: 12px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.acc-type  { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; }
.acc-bal   { font-size: 15px; font-weight: 700; }
.acc-bal.positive { color: var(--text); }
.acc-bal.negative { color: var(--expense); }

.add-account-card {
  flex-shrink: 0; width: 120px;
  background: transparent; border: 1.5px dashed var(--border2);
  border-radius: 14px; padding: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 600;
}
.add-account-card:active { background: var(--bg2); }

/* ── BUDGET BAR ── */
.budget-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.budget-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.budget-card-title { font-size: 13px; font-weight: 700; }
.budget-card-amounts { font-size: 11px; color: var(--text-dim); }
.budget-bar-bg { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.budget-bar-fill.ok   { background: linear-gradient(90deg, var(--income), #4CAF50); }
.budget-bar-fill.warn { background: linear-gradient(90deg, #F59020, var(--accent)); }
.budget-bar-fill.over { background: linear-gradient(90deg, var(--expense), #E74C3C); }
.budget-card-footer { display: flex; justify-content: space-between; font-size: 11px; }
.budget-remain { font-weight: 700; }
.budget-remain.ok   { color: var(--income); }
.budget-remain.warn { color: var(--accent); }
.budget-remain.over { color: var(--expense); }
.budget-pct { color: var(--text-muted); }

.no-budget-btn {
  width: 100%; padding: 11px;
  background: var(--accent-bg); border: 1.5px dashed var(--accent);
  border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.no-budget-btn:active { background: #FDE8CC; }

/* ── ALERT ── */
.alert-banner {
  border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.alert-banner.danger { background: var(--expense-bg); border: 1.5px solid #F5A9A3; }
.alert-banner.warn   { background: #FFF8E8; border: 1.5px solid #F5C07A; }
.alert-icon { font-size: 20px; }
.alert-title { font-size: 13px; font-weight: 700; }
.alert-title.danger { color: var(--expense); }
.alert-title.warn   { color: var(--accent); }
.alert-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* ── CHART ── */
.chart-legend { display: flex; gap: 10px; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; }

.chart-bars { display: flex; align-items: flex-end; gap: 4px; padding-bottom: 22px; position: relative; }
.chart-bars::after { content: ''; position: absolute; bottom: 22px; left: 0; right: 0; height: 1px; background: var(--border); }
.bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; position: relative; }
.bars { display: flex; align-items: flex-end; gap: 2px; flex: 1; width: 100%; justify-content: center; padding-bottom: 4px; }
.bar { width: 9px; border-radius: 3px 3px 0 0; min-height: 2px; }
.bar.income-bar  { background: var(--income); }
.bar.expense-bar { background: var(--expense); }
.bar-label { position: absolute; bottom: 0; font-size: 9px; color: var(--text-muted); text-align: center; width: 100%; }

/* ── CATEGORY ── */
.cat-list { display: flex; flex-direction: column; gap: 11px; }
.cat-item { display: flex; align-items: center; gap: 8px; }
.cat-emoji { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.cat-name  { font-size: 12px; color: var(--text-dim); width: 58px; flex-shrink: 0; }
.cat-bar-bg { flex: 1; height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.cat-amt { font-size: 11px; font-weight: 600; min-width: 52px; text-align: right; flex-shrink: 0; }
.cat-pct { font-size: 10px; color: var(--text-muted); min-width: 32px; text-align: right; flex-shrink: 0; }

.stacked-bar { display: flex; height: 22px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stacked-seg { height: 100%; transition: width 0.5s ease; }
.stacked-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-bottom: 14px; }
.stacked-leg-item { display: flex; align-items: center; gap: 5px; }
.stacked-leg-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.stacked-leg-name { font-size: 11px; color: var(--text-dim); }
.stacked-leg-pct  { font-size: 11px; font-weight: 700; }

/* ── QUICK STATS ── */
.quick-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.qs-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.qs-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 12px 12px; }
.qs-card.inc::after { background: var(--income); }
.qs-card.exp::after { background: var(--expense); }
.qs-card.bal::after { background: var(--accent); }
.qs-label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
.qs-value { font-size: 13px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
.qs-value.income   { color: var(--income); }
.qs-value.expense  { color: var(--expense); }
.qs-value.bal      { color: var(--accent); }
.qs-value.negative { color: var(--expense); }
.qs-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* ── SAVING BANNER ── */
.saving-banner {
  background: linear-gradient(135deg, var(--accent-bg), #FFF8EE);
  border: 1.5px solid #F5C07A; border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.sb-label { font-size: 13px; color: var(--text-dim); font-weight: 700; }
.sb-desc  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.sb-value { font-size: 30px; font-weight: 700; color: var(--accent); }

/* ── TRANSACTIONS ── */
.tx-section { margin-bottom: 14px; }
.tx-date-label { font-size: 11px; color: var(--text-muted); font-weight: 500; padding: 6px 4px; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
.tx-item {
  display: flex; align-items: center; padding: 12px 14px;
  background: var(--surface); border-radius: 12px; margin-bottom: 8px;
  gap: 12px; border: 1px solid var(--border); box-shadow: var(--shadow);
  cursor: pointer; transition: background 0.15s;
}
.tx-item:active { background: var(--bg2); box-shadow: none; }
.tx-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.tx-icon.income-icon   { background: var(--income-bg); }
.tx-icon.expense-icon  { background: var(--expense-bg); }
.tx-icon.transfer-icon { background: var(--purple-bg); }
.tx-icon.recurring-icon{ background: var(--blue-bg); }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
.tx-cat { font-size: 11px; color: var(--text-muted); }
.tx-badge { font-size: 9px; padding: 2px 6px; border-radius: 20px; font-weight: 700; }
.tx-badge.acc      { background: var(--bg2); color: var(--text-dim); }
.tx-badge.recurring{ background: var(--blue-bg); color: var(--blue); }
.tx-badge.transfer { background: var(--purple-bg); color: var(--purple); }
.tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.tx-amount { font-size: 15px; font-weight: 700; }
.tx-amount.income   { color: var(--income); }
.tx-amount.expense  { color: var(--expense); }
.tx-amount.transfer { color: var(--purple); }
.tx-del {
  width: 26px; height: 26px; background: transparent; border: none;
  color: var(--text-muted); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 6px; flex-shrink: 0;
}
.tx-del:active { background: var(--expense-bg); color: var(--expense); }

/* ── ACCOUNTS PAGE ── */
.account-full-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  box-shadow: var(--shadow); cursor: pointer; transition: background 0.15s;
}
.account-full-card:active { background: var(--bg2); box-shadow: none; }
.afc-icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.afc-icon.type-checking  { background: var(--blue-bg); }
.afc-icon.type-savings   { background: var(--income-bg); }
.afc-icon.type-card      { background: var(--expense-bg); }
.afc-icon.type-investment{ background: var(--purple-bg); }
.afc-icon.type-cash      { background: var(--accent-bg); }
.afc-info { flex: 1; min-width: 0; }
.afc-name { font-size: 15px; font-weight: 700; }
.afc-type { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.afc-right { text-align: right; flex-shrink: 0; }
.afc-balance { font-size: 18px; font-weight: 700; }
.afc-balance.positive { color: var(--text); }
.afc-balance.negative { color: var(--expense); }
.afc-initial { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.icon-btn {
  width: 28px; height: 28px; background: transparent; border: none;
  font-size: 14px; cursor: pointer; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.icon-btn:active { background: var(--bg2); }
.icon-btn.danger:active { background: var(--expense-bg); color: var(--expense); }

/* ── RECURRING ── */
.rec-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 14px; margin-bottom: 8px;
  box-shadow: var(--shadow); cursor: pointer; transition: background 0.15s;
}
.rec-item:active { background: var(--bg2); box-shadow: none; }
.rec-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: var(--blue-bg); }
.rec-info { flex: 1; min-width: 0; }
.rec-name   { font-size: 14px; font-weight: 600; }
.rec-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.rec-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.rec-amount { font-size: 15px; font-weight: 700; color: var(--expense); }
.rec-amount.transfer { color: var(--purple); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-icon { font-size: 34px; margin-bottom: 10px; }
.empty-text { font-size: 13px; }

/* ── SECTION ADD BTN ── */
.section-add-btn {
  width: 100%; padding: 11px;
  background: var(--bg2); border: 1.5px dashed var(--border2);
  border-radius: 12px; color: var(--text-dim); font-size: 13px; font-weight: 600;
  cursor: pointer; margin-top: 4px; font-family: inherit; transition: background 0.15s;
}
.section-add-btn:active { background: var(--border); color: var(--text); }

/* ── BOTTOM SHEET ── */
.sheet-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.sheet-bg.open { opacity: 1; pointer-events: all; }
.sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 24px 24px 0 0;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 92dvh; max-height: 92vh; overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
}
.sheet-bg.open .sheet { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 8px; }
.sheet-title { font-size: 17px; font-weight: 700; padding: 8px 20px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.sheet-body  { padding: 0 20px; }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-label { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 13px 14px;
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
  color: var(--text); font-size: 15px; font-family: inherit;
  outline: none; -webkit-appearance: none; transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); background: var(--surface); }

.type-toggle {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 4px; margin-bottom: 18px;
}
.type-toggle.two { grid-template-columns: 1fr 1fr; }
.type-btn {
  padding: 10px; border: none; border-radius: 9px; background: transparent;
  color: var(--text-dim); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.type-btn.active.expense  { background: var(--expense-bg); color: var(--expense); }
.type-btn.active.income   { background: var(--income-bg);  color: var(--income); }
.type-btn.active.transfer { background: var(--purple-bg);  color: var(--purple); }

.btn-save {
  width: 100%; padding: 15px;
  background: var(--accent); border: none; border-radius: 14px;
  color: #fff; font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 4px 14px rgba(232,118,10,0.3); transition: background 0.2s, transform 0.15s;
}
.btn-save:active { transform: scale(0.98); background: var(--accent-dk); }

/* ── ACCOUNT TYPE GRID ── */
.type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.type-grid-btn {
  padding: 10px 6px; border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--bg); color: var(--text-dim); font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit;
}
.type-grid-btn .tg-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.type-grid-btn.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

/* ── BUDGET CAT INPUTS ── */
.budget-cat-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.budget-cat-item { display: flex; align-items: center; gap: 10px; }
.bci-label { font-size: 12px; color: var(--text-dim); width: 68px; flex-shrink: 0; font-weight: 500; }
.bci-input {
  flex: 1; padding: 9px 12px;
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 13px; font-family: inherit;
  outline: none; -webkit-appearance: none; transition: border-color 0.2s;
}
.bci-input:focus { border-color: var(--accent); background: var(--surface); }

/* ── CUSTOM CONFIRM ── */
.confirm-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.confirm-bg.open { opacity: 1; pointer-events: all; }
.confirm-box {
  background: var(--surface); border-radius: 18px; padding: 24px 20px 16px;
  width: 280px; box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  transform: scale(0.95); transition: transform 0.2s;
}
.confirm-bg.open .confirm-box { transform: scale(1); }
.confirm-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.confirm-desc  { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; }
.confirm-btns  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.confirm-cancel{ padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text-dim); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.confirm-ok    { padding: 12px; background: var(--expense); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.confirm-cancel:active { background: var(--border); }
.confirm-ok:active { opacity: 0.85; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
  background: #1C1A17; color: #fff; font-size: 13px; font-weight: 600;
  padding: 10px 20px; border-radius: 20px; z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

::-webkit-scrollbar { width: 0; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.anim { animation: slideUp 0.28s ease both; }
</style>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────
const CATEGORIES = {
  expense: ['식비','교통','주거','쇼핑','의료','문화/여가','교육','통신','육아','기타지출'],
  income:  ['급여','부업','투자','용돈','환급','기타수입'],
  transfer: []
};

const CAT_COLORS = {
  '식비':'#E05C4B','교통':'#D4A853','주거':'#3A9E5F','쇼핑':'#3B82C4','의료':'#9B59B6',
  '문화/여가':'#C0399B','교육':'#16A085','통신':'#D4A853','육아':'#F0A500','기타지출':'#8E8880',
  '급여':'#2D7D46','부업':'#3B82C4','투자':'#D4A853','용돈':'#9B59B6','환급':'#16A085','기타수입':'#8E8880'
};

const CAT_EMOJI = {
  '식비':'🍚','교통':'🚇','주거':'🏠','쇼핑':'🛍','의료':'💊','문화/여가':'🎬','교육':'📚',
  '통신':'📱','육아':'🍼','기타지출':'📌',
  '급여':'💰','부업':'💼','투자':'📈','용돈':'🎁','환급':'💸','기타수입':'✨'
};

const ACC_TYPE_LABEL = { checking:'입출금', savings:'적금/저축', card:'카드', investment:'투자', cash:'현금' };
const ACC_TYPE_ICON  = { checking:'🏦', savings:'🐷', card:'💳', investment:'📈', cash:'💵' };

// ── STATE ──────────────────────────────────────────────────────────────
const now = new Date();
let currentYear  = now.getFullYear();
let currentMonth = now.getMonth();
let currentView  = 'dashboard';
let modalType    = 'expense';
let selectedAccType  = 'checking';
let editingTxId      = null;
let editingAccountId = null;

let transactions       = load('hb_tx',       []);
let recurringItems     = load('hb_rec',      []);
let recurringTransfers = load('hb_rec_tr',   []);
let budget             = load('hb_budget',   { total: 0, cats: {} });
let accounts           = load('hb_accounts', []);

// ── STORAGE ────────────────────────────────────────────────────────────
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function saveData() {
  localStorage.setItem('hb_tx',       JSON.stringify(transactions));
  localStorage.setItem('hb_rec',      JSON.stringify(recurringItems));
  localStorage.setItem('hb_rec_tr',   JSON.stringify(recurringTransfers));
  localStorage.setItem('hb_budget',   JSON.stringify(budget));
  localStorage.setItem('hb_accounts', JSON.stringify(accounts));
}

// ── HELPERS ────────────────────────────────────────────────────────────
function fmt(n) { return '₩' + Math.abs(n).toLocaleString('ko-KR'); }
function uid()  { return Date.now().toString(); }

function getMonthTx(y, m) {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });
}
function sumInc(txs) { return txs.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0); }
function sumExp(txs) { return txs.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0); }

function getAccountBalance(id) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return 0;
  return transactions.reduce((bal, t) => {
    if (t.type === 'income'    && t.accountId     === id) return bal + t.amount;
    if (t.type === 'expense'   && t.accountId     === id) return bal - t.amount;
    if (t.type === 'transfer'  && t.fromAccountId === id) return bal - t.amount;
    if (t.type === 'transfer'  && t.toAccountId   === id) return bal + t.amount;
    return bal;
  }, acc.initialAmount);
}

function getTotalAsset() { return accounts.reduce((s, a) => s + getAccountBalance(a.id), 0); }

function buildAccountOptions(selectId, excludeId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = accounts.length
    ? accounts.filter(a => a.id !== excludeId).map(a => `<option value="${a.id}">${ACC_TYPE_ICON[a.type]} ${a.name}</option>`).join('')
    : '<option value="">계좌 없음 (계좌 탭에서 추가)</option>';
}

// ── NAVIGATION ─────────────────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  document.getElementById('body-scroll').scrollTop = 0;
  render();
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
  document.getElementById('month-label').textContent = currentYear + '. ' + String(currentMonth + 1).padStart(2, '0');
  render();
}

// ── RENDER DISPATCH ────────────────────────────────────────────────────
function render() {
  const txs = getMonthTx(currentYear, currentMonth);
  const inc = sumInc(txs), exp = sumExp(txs);
  document.getElementById('hdr-income').textContent  = fmt(inc);
  document.getElementById('hdr-expense').textContent = fmt(exp);
  if (currentView === 'dashboard')    renderDash(txs, inc, exp);
  if (currentView === 'transactions') renderTx();
  if (currentView === 'accounts')     renderAccounts();
  if (currentView === 'recurring')    renderRecurring();
  if (currentView === 'stats')        renderStats();
}

// ── DASHBOARD ──────────────────────────────────────────────────────────
function renderDash(txs, inc, exp) {
  const total = getTotalAsset();
  const hb = document.getElementById('hero-balance');
  hb.textContent = fmt(total);
  hb.className = 'bh-amount' + (total < 0 ? ' negative' : '');
  document.getElementById('hero-income').textContent  = fmt(inc);
  document.getElementById('hero-expense').textContent = fmt(exp);

  // Account cards
  const accEl = document.getElementById('dashboard-accounts');
  accEl.innerHTML = accounts.map(acc => {
    const bal = getAccountBalance(acc.id);
    return `<div class="account-card type-${acc.type}">
      <div class="acc-icon">${ACC_TYPE_ICON[acc.type]}</div>
      <div class="acc-name">${acc.name}</div>
      <div class="acc-type">${ACC_TYPE_LABEL[acc.type]}</div>
      <div class="acc-bal ${bal >= 0 ? 'positive' : 'negative'}">${bal < 0 ? '-' : ''}${fmt(bal)}</div>
    </div>`;
  }).join('') + `<div class="add-account-card" onclick="showView('accounts')"><div style="font-size:24px;color:var(--border2)">+</div>계좌 관리</div>`;

  // Budget alert & bar
  renderBudgetStatus(exp);

  renderBarChart('chart-main', 6, 78);
  renderCatList('cat-exp-dash', txs, 'expense');
}

function renderBudgetStatus(exp) {
  const alertEl  = document.getElementById('alert-area');
  const budgetEl = document.getElementById('budget-status-area');

  if (!budget.total) {
    alertEl.innerHTML = '';
    budgetEl.innerHTML = `<div class="budget-card" style="padding:14px 18px;"><button class="no-budget-btn" onclick="openBudgetSheet()">💰 이번 달 예산 설정하기</button></div>`;
    return;
  }

  const pct    = Math.round((exp / budget.total) * 100);
  const remain = budget.total - exp;
  const cls    = pct < 80 ? 'ok' : pct < 100 ? 'warn' : 'over';

  alertEl.innerHTML = pct >= 100
    ? `<div class="alert-banner danger anim"><div class="alert-icon">🚨</div><div><div class="alert-title danger">예산 초과! ${fmt(Math.abs(remain))} 초과했어요</div><div class="alert-sub">이번 달 예산: ${fmt(budget.total)}</div></div></div>`
    : pct >= 80
    ? `<div class="alert-banner warn anim"><div class="alert-icon">⚠️</div><div><div class="alert-title warn">예산의 ${pct}% 사용했어요</div><div class="alert-sub">잔여 예산: ${fmt(remain)}</div></div></div>`
    : '';

  budgetEl.innerHTML = `<div class="budget-card anim" onclick="openBudgetSheet()" style="cursor:pointer;">
    <div class="budget-card-header">
      <div class="budget-card-title">이번 달 예산</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="budget-card-amounts">${fmt(exp)} / ${fmt(budget.total)}</div>
        <span style="font-size:11px;color:var(--accent);font-weight:600;">수정</span>
      </div>
    </div>
    <div class="budget-bar-bg"><div class="budget-bar-fill ${cls}" style="width:${Math.min(pct, 100)}%"></div></div>
    <div class="budget-card-footer">
      <div class="budget-remain ${cls}">${remain >= 0 ? '잔여 ' + fmt(remain) : '초과 ' + fmt(Math.abs(remain))}</div>
      <div class="budget-pct">${pct}%</div>
    </div>
  </div>`;
}

// ── BAR CHART ──────────────────────────────────────────────────────────
function renderBarChart(elId, months, H) {
  const el = document.getElementById(elId);
  if (!el) return;
  const data = [];
  for (let i = months - 1; i >= 0; i--) {
    let m = currentMonth - i, y = currentYear;
    while (m < 0) { m += 12; y--; }
    const txs = getMonthTx(y, m);
    data.push({ label: (m + 1) + '월', income: sumInc(txs), expense: sumExp(txs) });
  }
  const max = Math.max(...data.map(d => Math.max(d.income, d.expense)), 1);
  el.innerHTML = data.map(d => `
    <div class="bar-group">
      <div class="bars">
        <div class="bar income-bar"  style="height:${Math.max((d.income  / max) * H, d.income  > 0 ? 3 : 0)}px"></div>
        <div class="bar expense-bar" style="height:${Math.max((d.expense / max) * H, d.expense > 0 ? 3 : 0)}px"></div>
      </div>
      <div class="bar-label">${d.label}</div>
    </div>`).join('');
}

// ── CATEGORY LIST ──────────────────────────────────────────────────────
function renderCatList(elId, txs, type) {
  const el = document.getElementById(elId);
  if (!el) return;
  const filtered = txs.filter(t => t.type === type);
  if (!filtered.length) { el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">데이터가 없습니다.</div>'; return; }

  const totals = {};
  filtered.forEach(t => { totals[t.category] = (totals[t.category] || 0) + t.amount; });
  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const total  = sorted.reduce((s, [, v]) => s + v, 0);
  const max    = sorted[0][1];

  const segments = sorted.map(([cat, amt]) => {
    const pct = (amt / total * 100).toFixed(1);
    return `<div class="stacked-seg" style="width:${pct}%;background:${CAT_COLORS[cat] || '#999'}" title="${cat} ${pct}%"></div>`;
  }).join('');

  const legend = sorted.map(([cat, amt]) => `
    <div class="stacked-leg-item">
      <div class="stacked-leg-dot" style="background:${CAT_COLORS[cat] || '#999'}"></div>
      <span class="stacked-leg-name">${CAT_EMOJI[cat] || ''} ${cat}</span>
      <span class="stacked-leg-pct">${Math.round(amt / total * 100)}%</span>
    </div>`).join('');

  const bars = sorted.map(([cat, amt]) => `
    <div class="cat-item">
      <div class="cat-emoji">${CAT_EMOJI[cat] || '📌'}</div>
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(amt / max) * 100}%;background:${CAT_COLORS[cat] || '#999'}"></div></div>
      <div class="cat-amt">${fmt(amt)}</div>
      <div class="cat-pct">${Math.round(amt / total * 100)}%</div>
    </div>`).join('');

  el.innerHTML = `<div class="stacked-bar">${segments}</div><div class="stacked-legend">${legend}</div><div class="cat-list">${bars}</div>`;
}

// ── TRANSACTIONS ───────────────────────────────────────────────────────
function renderTx() {
  const el = document.getElementById('tx-container');
  const allTx = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
  }).sort((a, b) => new Date(b.date) - new Date(a.date));

  if (!allTx.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">이번 달 거래 내역이 없습니다.</div></div>';
    return;
  }

  const groups = {};
  allTx.forEach(t => { if (!groups[t.date]) groups[t.date] = []; groups[t.date].push(t); });

  el.innerHTML = Object.entries(groups).map(([date, items]) => {
    const d   = new Date(date);
    const day = ['일','월','화','수','목','금','토'][d.getDay()];
    return `<div class="tx-section">
      <div class="tx-date-label">${d.getMonth() + 1}월 ${d.getDate()}일 (${day})</div>
      ${items.map(t => {
        const accName = t.type === 'transfer'
          ? (accounts.find(a => a.id === t.fromAccountId)?.name || '') + ' → ' + (accounts.find(a => a.id === t.toAccountId)?.name || '')
          : accounts.find(a => a.id === t.accountId)?.name || '';
        const iconClass = t.type === 'transfer' ? 'transfer-icon' : t.recurring ? 'recurring-icon' : t.type + '-icon';
        const amtClass  = t.type === 'transfer' ? 'transfer' : t.type;
        const prefix    = t.type === 'income' ? '+' : t.type === 'transfer' ? '↔' : '-';
        return `<div class="tx-item" onclick="editTx('${t.id}')">
          <div class="tx-icon ${iconClass}">${t.type === 'transfer' ? '↔️' : CAT_EMOJI[t.category] || '📌'}</div>
          <div class="tx-info">
            <div class="tx-name">${t.desc || (t.type === 'transfer' ? '계좌 이체' : t.category)}</div>
            <div class="tx-meta">
              ${t.type !== 'transfer' ? `<span class="tx-cat">${t.category}</span>` : ''}
              ${accName      ? `<span class="tx-badge acc">${accName}</span>` : ''}
              ${t.recurring  ? `<span class="tx-badge recurring">반복</span>` : ''}
              ${t.type === 'transfer' ? `<span class="tx-badge transfer">이체</span>` : ''}
            </div>
          </div>
          <div class="tx-right">
            <div class="tx-amount ${amtClass}">${prefix}${fmt(t.amount)}</div>
            <button class="tx-del" onclick="deleteTxBtn(event,'${t.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ── ACCOUNTS ───────────────────────────────────────────────────────────
function renderAccounts() {
  const el    = document.getElementById('accounts-list');
  const total = getTotalAsset();
  document.getElementById('total-asset-badge').textContent = `총 ${total < 0 ? '-' : ''}${fmt(total)}`;

  if (!accounts.length) {
    el.innerHTML = '<div class="empty-state" style="padding:24px 0;"><div class="empty-icon">🏦</div><div class="empty-text">계좌를 추가해보세요.</div></div>';
    return;
  }
  el.innerHTML = accounts.map(acc => {
    const bal = getAccountBalance(acc.id);
    return `<div class="account-full-card" onclick="openEditAccountSheet('${acc.id}')" style="cursor:pointer;">
      <div class="afc-icon type-${acc.type}">${ACC_TYPE_ICON[acc.type]}</div>
      <div class="afc-info"><div class="afc-name">${acc.name}</div><div class="afc-type">${ACC_TYPE_LABEL[acc.type]}</div></div>
      <div class="afc-right">
        <div class="afc-balance ${bal >= 0 ? 'positive' : 'negative'}">${bal < 0 ? '-' : ''}${fmt(bal)}</div>
        <div class="afc-initial">초기 ${acc.initialAmount < 0 ? '-' : ''}${fmt(acc.initialAmount)}</div>
      </div>
      <button class="icon-btn danger" onclick="deleteAccount(event,'${acc.id}')">✕</button>
    </div>`;
  }).join('');
}

// ── RECURRING ──────────────────────────────────────────────────────────
function renderRecurring() {
  const expTotal = recurringItems.reduce((a, b) => a + b.amount, 0);
  const trTotal  = recurringTransfers.reduce((a, b) => a + b.amount, 0);
  document.getElementById('rec-total-badge').textContent    = '합계: ' + fmt(expTotal);
  document.getElementById('rec-tr-total-badge').textContent = '합계: ' + fmt(trTotal);

  const recEl = document.getElementById('recurring-list');
  recEl.innerHTML = recurringItems.length
    ? recurringItems.map(r => `
        <div class="rec-item" onclick="openEditRecurringSheet('${r.id}')" style="cursor:pointer;">
          <div class="rec-icon">${CAT_EMOJI[r.category] || '📌'}</div>
          <div class="rec-info"><div class="rec-name">${r.name}</div><div class="rec-detail">매월 ${r.day}일 · ${r.category}${accounts.find(a=>a.id===r.accountId) ? ' · ' + accounts.find(a=>a.id===r.accountId).name : ''}</div></div>
          <div class="rec-right"><div class="rec-amount">-${fmt(r.amount)}</div><button class="tx-del" onclick="deleteRecurringBtn(event,'${r.id}')">✕</button></div>
        </div>`).join('')
    : '<div class="empty-state" style="padding:20px 0;"><div class="empty-icon">🔄</div><div class="empty-text">반복 지출이 없습니다.</div></div>';

  const trEl = document.getElementById('recurring-transfer-list');
  trEl.innerHTML = recurringTransfers.length
    ? recurringTransfers.map(r => {
        const fromName = accounts.find(a => a.id === r.fromAccountId)?.name || '?';
        const toName   = accounts.find(a => a.id === r.toAccountId)?.name   || '?';
        return `<div class="rec-item" onclick="openEditRecTransferSheet('${r.id}')" style="cursor:pointer;">
          <div class="rec-icon" style="background:var(--purple-bg);">↔️</div>
          <div class="rec-info"><div class="rec-name">${r.name}</div><div class="rec-detail">매월 ${r.day}일 · ${fromName} → ${toName}</div></div>
          <div class="rec-right"><div class="rec-amount transfer">${fmt(r.amount)}</div><button class="tx-del" onclick="deleteRecTransferBtn(event,'${r.id}')">✕</button></div>
        </div>`;
      }).join('')
    : '<div class="empty-state" style="padding:20px 0;"><div class="empty-icon">↔️</div><div class="empty-text">반복 이체가 없습니다.</div></div>';

  // 이번 달 현황
  const statusEl = document.getElementById('recurring-month-status');
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;
  const allRec = [
    ...recurringItems.map(r => ({ ...r, recType: 'expense' })),
    ...recurringTransfers.map(r => ({ ...r, recType: 'transfer' }))
  ].sort((a, b) => a.day - b.day);

  if (!allRec.length) { statusEl.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:4px 0;">반복 항목을 추가해보세요.</div>'; return; }

  statusEl.innerHTML = allRec.map(r => {
    const paid   = transactions.some(t => t.recurringId === r.id && new Date(t.date).getFullYear() === currentYear && new Date(t.date).getMonth() === currentMonth);
    const isPast = isCurrentMonth ? today.getDate() >= r.day : true;
    const icon   = r.recType === 'transfer' ? '↔️' : (CAT_EMOJI[r.category] || '📌');
    const color  = r.recType === 'transfer' ? 'var(--purple)' : 'var(--expense)';
    const fn     = r.recType === 'transfer' ? `payRecTransfer('${r.id}')` : `payRecurring('${r.id}')`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:18px;">${icon}</div>
        <div>
          <div style="font-size:13px;font-weight:600;">${r.name}</div>
          <div style="font-size:11px;color:var(--text-muted);">매월 ${r.day}일 · <span style="color:${color};">${fmt(r.amount)}</span></div>
        </div>
      </div>
      ${paid
        ? '<span style="font-size:11px;padding:4px 10px;background:var(--income-bg);color:var(--income);border-radius:20px;font-weight:700;">✓ 완료</span>'
        : isPast
          ? `<button onclick="${fn}" style="font-size:12px;padding:6px 12px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;">등록</button>`
          : `<span style="font-size:11px;padding:4px 10px;background:var(--bg2);color:var(--text-muted);border-radius:20px;">${r.day}일 예정</span>`
      }
    </div>`;
  }).join('');
}

// ── STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const txs = getMonthTx(currentYear, currentMonth);
  const inc     = sumInc(txs);
  const expOnly = txs.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);

  // 저축액 = 이번 달 이체 중 적금/투자 계좌로 들어간 금액
  const savedAmt = txs
    .filter(t => t.type === 'transfer')
    .filter(t => { const acc = accounts.find(a => a.id === t.toAccountId); return acc && (acc.type === 'savings' || acc.type === 'investment'); })
    .reduce((a, b) => a + b.amount, 0);

  const rate = inc > 0 ? Math.round((savedAmt / inc) * 100) : 0;

  document.getElementById('stats-rate').textContent = rate + '%';
  document.getElementById('stats-saving-desc').textContent = inc > 0
    ? `수입 ${fmt(inc)} 중 ${fmt(savedAmt)} 저축`
    : '수입 없음';

  const sbEl = document.getElementById('st-bal');
  sbEl.textContent = fmt(inc - expOnly);
  sbEl.className   = 'qs-value ' + ((inc - expOnly) >= 0 ? 'bal' : 'negative');
  document.getElementById('st-inc').textContent     = fmt(inc);
  document.getElementById('st-exp').textContent     = fmt(expOnly);
  document.getElementById('st-inc-cnt').textContent = txs.filter(t => t.type === 'income').length  + '건';
  document.getElementById('st-exp-cnt').textContent = txs.filter(t => t.type === 'expense').length + '건';

  renderBarChart('chart-stats', 6, 95);
  renderCatList('cat-exp-stats', txs, 'expense');
  renderCatList('cat-inc-stats', txs, 'income');

  const bdEl = document.getElementById('budget-settings-display');
  if (budget.total) {
    const cats = Object.entries(budget.cats).filter(([, v]) => v > 0);
    bdEl.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:10px;">
        <span style="font-size:13px;color:var(--text-dim);font-weight:500;">전체 예산</span>
        <span style="font-size:16px;font-weight:700;color:var(--accent);">${fmt(budget.total)}</span>
      </div>
      ${cats.map(([cat, amt]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;">
          <span style="font-size:12px;color:var(--text-dim);">${CAT_EMOJI[cat] || ''} ${cat}</span>
          <span style="font-size:13px;font-weight:600;">${fmt(amt)}</span>
        </div>`).join('')}
      ${!cats.length ? '<div style="font-size:12px;color:var(--text-muted);">카테고리 예산 없음</div>' : ''}`;
  } else {
    bdEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">예산이 설정되지 않았습니다.</div>';
  }
}

// ── TRANSACTION SHEET ──────────────────────────────────────────────────
function openSheet() {
  if (!accounts.length) {
    showToast('⚠️ 먼저 계좌 탭에서 계좌를 추가해주세요');
    showView('accounts');
    return;
  }
  editingTxId = null;
  document.getElementById('tx-sheet-title').textContent = '새 내역 추가';
  document.getElementById('tx-save-btn').textContent    = '저장하기';
  document.getElementById('input-date').value   = new Date().toISOString().slice(0, 10);
  document.getElementById('input-amount').value = '';
  document.getElementById('input-desc').value   = '';
  setType('expense');
  document.getElementById('sheet-bg').classList.add('open');
}

function closeSheet() { document.getElementById('sheet-bg').classList.remove('open'); }

function editTx(id) {
  const t = transactions.find(t => t.id === id);
  if (!t) return;
  editingTxId = id;
  document.getElementById('tx-sheet-title').textContent = '내역 수정';
  document.getElementById('tx-save-btn').textContent    = '수정하기';
  document.getElementById('input-date').value   = t.date;
  document.getElementById('input-amount').value = t.amount;
  document.getElementById('input-desc').value   = t.desc || '';
  setType(t.type);
  if (t.type !== 'transfer') {
    document.getElementById('input-cat').value      = t.category;
    document.getElementById('input-acc-from').value = t.accountId || '';
  } else {
    document.getElementById('input-acc-from').value = t.fromAccountId || '';
    document.getElementById('input-acc-to').value   = t.toAccountId   || '';
  }
  document.getElementById('sheet-bg').classList.add('open');
}

function setType(type) {
  modalType = type;
  ['expense', 'income', 'transfer'].forEach(t => {
    document.getElementById('btn-' + t).className = 'type-btn' + (t === type ? ' active ' + t : '');
  });
  const isTransfer = type === 'transfer';
  document.getElementById('cat-group').style.display    = isTransfer ? 'none' : 'block';
  document.getElementById('acc-to-group').style.display = isTransfer ? 'block' : 'none';
  document.getElementById('acc-from-label').textContent = type === 'income' ? '입금 계좌' : '출금 계좌';
  if (!isTransfer) {
    document.getElementById('input-cat').innerHTML = CATEGORIES[type].map(c => `<option value="${c}">${CAT_EMOJI[c] || ''} ${c}</option>`).join('');
  }
  buildAccountOptions('input-acc-from', null);
  if (isTransfer) buildAccountOptions('input-acc-to', null);
}

function saveTransaction() {
  const date   = document.getElementById('input-date').value;
  const amount = parseInt(document.getElementById('input-amount').value);
  const desc   = document.getElementById('input-desc').value.trim();
  if (!date || !amount || amount <= 0) { alert('날짜와 금액을 입력해주세요.'); return; }

  let tx;
  if (modalType === 'transfer') {
    const fromId = document.getElementById('input-acc-from').value;
    const toId   = document.getElementById('input-acc-to').value;
    if (fromId === toId) { alert('출금 계좌와 입금 계좌가 같습니다.'); return; }
    tx = { date, amount, type: 'transfer', fromAccountId: fromId, toAccountId: toId, desc: desc || '계좌 이체' };
  } else {
    tx = { date, amount, type: modalType, category: document.getElementById('input-cat').value, accountId: document.getElementById('input-acc-from').value, desc };
  }

  if (editingTxId) {
    const idx = transactions.findIndex(t => t.id === editingTxId);
    if (idx !== -1) transactions[idx] = { ...transactions[idx], ...tx };
  } else {
    transactions.push({ id: uid(), ...tx });
  }
  saveData(); closeSheet(); render();
}

function deleteTxBtn(e, id) { e.stopPropagation(); deleteWithConfirm('내역 삭제', '이 내역을 삭제하면 복구할 수 없어요.', () => { transactions = transactions.filter(t => t.id !== id); saveData(); render(); }); }

// ── ACCOUNT SHEET ──────────────────────────────────────────────────────
function selectAccType(btn) {
  document.querySelectorAll('#acc-type-grid .type-grid-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAccType = btn.dataset.type;
}

function openAccountSheet() {
  editingAccountId = null;
  document.getElementById('acc-sheet-title').textContent = '계좌 추가';
  document.getElementById('acc-save-btn').textContent    = '추가하기';
  document.getElementById('acc-name').value    = '';
  document.getElementById('acc-initial').value = '';
  selectedAccType = 'checking';
  document.querySelectorAll('#acc-type-grid .type-grid-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === 'checking'));
  document.getElementById('acc-sheet-bg').classList.add('open');
}

function openEditAccountSheet(id) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return;
  editingAccountId = id;
  document.getElementById('acc-sheet-title').textContent = '계좌 수정';
  document.getElementById('acc-save-btn').textContent    = '저장하기';
  document.getElementById('acc-name').value    = acc.name;
  document.getElementById('acc-initial').value = acc.initialAmount;
  selectedAccType = acc.type;
  document.querySelectorAll('#acc-type-grid .type-grid-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === acc.type));
  document.getElementById('acc-sheet-bg').classList.add('open');
}

function closeAccSheet() { document.getElementById('acc-sheet-bg').classList.remove('open'); }

function saveAccount() {
  const name    = document.getElementById('acc-name').value.trim();
  const initial = parseFloat(document.getElementById('acc-initial').value) || 0;
  if (!name) { alert('계좌 이름을 입력해주세요.'); return; }
  if (editingAccountId) {
    const idx = accounts.findIndex(a => a.id === editingAccountId);
    if (idx !== -1) accounts[idx] = { ...accounts[idx], name, type: selectedAccType, initialAmount: initial };
  } else {
    accounts.push({ id: uid(), name, type: selectedAccType, initialAmount: initial });
  }
  saveData(); closeAccSheet(); render();
}

function deleteAccount(e, id) {
  e.stopPropagation();
  const used = transactions.some(t => t.accountId === id || t.fromAccountId === id || t.toAccountId === id);
  deleteWithConfirm('계좌 삭제', used ? '거래 내역이 있는 계좌예요. 그래도 삭제할까요?' : '이 계좌를 삭제할까요?', () => {
    accounts = accounts.filter(a => a.id !== id);
    saveData(); render();
  });
}

// ── RECURRING EXPENSE SHEET ────────────────────────────────────────────
let editingRecId   = null;
let editingRecTrId = null;

function openRecurringSheet() {
  editingRecId = null;
  document.getElementById('rec-sheet-title').textContent = '반복 지출 추가';
  document.getElementById('rec-save-btn').textContent    = '추가하기';
  ['rec-day','rec-amount','rec-name'].forEach(id => document.getElementById(id).value = '');
  buildAccountOptions('rec-acc', null);
  document.getElementById('rec-sheet-bg').classList.add('open');
}

function openEditRecurringSheet(id) {
  const r = recurringItems.find(r => r.id === id);
  if (!r) return;
  editingRecId = id;
  document.getElementById('rec-sheet-title').textContent = '반복 지출 수정';
  document.getElementById('rec-save-btn').textContent    = '저장하기';
  document.getElementById('rec-day').value    = r.day;
  document.getElementById('rec-amount').value = r.amount;
  document.getElementById('rec-name').value   = r.name;
  document.getElementById('rec-cat').value    = r.category;
  buildAccountOptions('rec-acc', null);
  document.getElementById('rec-acc').value = r.accountId || '';
  document.getElementById('rec-sheet-bg').classList.add('open');
}

function closeRecSheet() { document.getElementById('rec-sheet-bg').classList.remove('open'); }

function saveRecurring() {
  const day    = parseInt(document.getElementById('rec-day').value);
  const amount = parseInt(document.getElementById('rec-amount').value);
  const name   = document.getElementById('rec-name').value.trim();
  const cat    = document.getElementById('rec-cat').value;
  const accId  = document.getElementById('rec-acc').value;
  if (!day || day < 1 || day > 31 || !amount || !name) { alert('모든 항목을 입력해주세요.'); return; }
  if (editingRecId) {
    const idx = recurringItems.findIndex(r => r.id === editingRecId);
    if (idx !== -1) recurringItems[idx] = { ...recurringItems[idx], day, amount, name, category: cat, accountId: accId };
  } else {
    recurringItems.push({ id: uid(), day, amount, name, category: cat, accountId: accId });
  }
  saveData(); closeRecSheet(); render();
}

function deleteRecurringBtn(e, id) { e.stopPropagation(); deleteRecurring(id); }
function deleteRecurring(id) {
  deleteWithConfirm('반복 지출 삭제', '이 반복 지출을 삭제할까요?', () => {
    recurringItems = recurringItems.filter(r => r.id !== id);
    saveData(); render();
  });
}

function payRecurring(id) {
  const r = recurringItems.find(r => r.id === id);
  if (!r) return;
  const date = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(r.day).padStart(2, '0')}`;
  transactions.push({ id: uid(), date, amount: r.amount, type: 'expense', category: r.category, accountId: r.accountId, desc: r.name, recurring: true, recurringId: r.id });
  saveData(); render();
  showToast('✓ 내역에 등록됐어요');
}

// ── RECURRING TRANSFER SHEET ───────────────────────────────────────────
function openRecTransferSheet() {
  editingRecTrId = null;
  document.getElementById('rec-tr-sheet-title').textContent = '반복 이체 추가';

  buildAccountOptions('rec-tr-from', null);
  buildAccountOptions('rec-tr-to', null);
  document.getElementById('rec-tr-sheet-bg').classList.add('open');
}

function openEditRecTransferSheet(id) {

  editingRecTrId = id;

function closeRecTransferSheet() { document.getElementById('rec-tr-sheet-bg').classList.remove('open'); }

function saveRecTransfer() {
  const day    = parseInt(document.getElementById('rec-tr-day').value);
  const amount = parseInt(document.getElementById('rec-tr-amount').value);
  const name   = document.getElementById('rec-tr-name').value.trim();
  const fromId = document.getElementById('rec-tr-from').value;
  const toId   = document.getElementById('rec-tr-to').value;

    const idx = recurringTransfers.findIndex(r => r.id === editingRecTrId);

  } else {
    recurringTransfers.push({ id: uid(), day, amount, name, fromAccountId: fromId, toAccountId: toId });
  }

}

function deleteRecTransferBtn(e, id) { e.stopPropagation(); deleteRecTransfer(id); }
function deleteRecTransfer(id) {
  deleteWithConfirm('반복 이체 삭제', '이 반복 이체를 삭제할까요?', () => {
    recurringTransfers = recurringTransfers.filter(r => r.id !== id);
    saveData(); render();
  });
}

function payRecTransfer(id) {
  const r = recurringTransfers.find(r => r.id === id);
  if (!r) return;
  const date = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(r.day).padStart(2, '0')}`;
  transactions.push({ id: uid(), date, amount: r.amount, type: 'transfer', fromAccountId: r.fromAccountId, toAccountId: r.toAccountId, desc: r.name, recurring: true, recurringId: r.id });
  saveData(); render();
  showToast('✓ 이체 내역에 등록됐어요');
}

// ── BUDGET SHEET ───────────────────────────────────────────────────────
function openBudgetSheet() {
  document.getElementById('budget-total').value = budget.total || '';
  document.getElementById('budget-cat-inputs').innerHTML = CATEGORIES.expense.map(cat => `
    <div class="budget-cat-item">
      <div class="bci-label">${CAT_EMOJI[cat] || ''} ${cat}</div>
      <input type="number" inputmode="numeric" class="bci-input" id="bcat-${cat}" placeholder="0" value="${budget.cats[cat] || ''}">
    </div>`).join('');
  document.getElementById('budget-sheet-bg').classList.add('open');
}
function closeBudgetSheet() { document.getElementById('budget-sheet-bg').classList.remove('open'); }

function saveBudget() {
  const total = parseInt(document.getElementById('budget-total').value) || 0;
  const cats  = {};
  CATEGORIES.expense.forEach(cat => {
    const v = parseInt(document.getElementById('bcat-' + cat)?.value) || 0;
    if (v > 0) cats[cat] = v;
  });
  budget = { total, cats };
  saveData(); closeBudgetSheet(); render();
}

// ── TOAST ──────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function deleteWithConfirm(title, desc, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-desc').textContent  = desc;
  document.getElementById('confirm-ok-btn').onclick    = () => { closeConfirm(); onOk(); };
  document.getElementById('confirm-bg').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-bg').classList.remove('open'); }

// ── INIT ───────────────────────────────────────────────────────────────
document.getElementById('month-label').textContent = currentYear + '. ' + String(currentMonth + 1).padStart(2, '0');
setType('expense');
render();
</script>
